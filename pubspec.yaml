name: pantallas_fitlabs
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.8.4
  http: ^1.6.0
  shared_preferences: ^2.2.2
  google_mlkit_translation: ^0.11.0
  image_picker: ^1.2.1
  audioplayers: ^6.6.0
  record: ^6.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/rubik_vinyl/RubikVinyl-Regular.ttf 
    - assets/json/exercises.json
  
  fonts:
    - family: RubikVinyl
      fonts:
        - asset: assets/fonts/rubik_vinyl/RubikVinyl-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icono.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icono.png"
